<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Investment Advisor</title>
    <!--
      Vite reemplaza %VITE_*% en build time con los valores de .env.local (local)
      o de las Environment Variables de Vercel (producción).
      Las keys de API nunca se hardcodean en el repo.
    -->

      window.ENV = {
        ANTHROPIC_API_KEY:     "%VITE_ANTHROPIC_API_KEY%",
        ALPHA_VANTAGE_API_KEY: "%VITE_ALPHA_VANTAGE_API_KEY%",
        YAHOO_FINANCE_PROXY:   "%VITE_YAHOO_FINANCE_PROXY%",
      };
    </script>
  </head>
  <body class="bg-gray-950">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
